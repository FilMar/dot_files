# distrobox-assemble manifest: Arch dev box, terminal dotfiles, dedicated home.
# Usage:
#   distrobox assemble create --file distrobox.ini
#   distrobox enter dev-arch
#
# Dedicated home (not the host one) -> backup = `tar` of that single directory.
# init_hooks run after the packages are installed, as root: we drop to the user
# with `su -`, clone the dotfiles into the new home, and run the setup script.

[dev-arch]
image=archlinux:latest
home=/home/filippo/distrobox/dev-arch
additional_packages="zsh starship neovim fzf git curl base-devel bat fd tree bun python"
init_hooks=su - filippo -c "test -d ~/git_projects/dot_files || git clone https://github.com/FilMar/dot_files.git ~/git_projects/dot_files; bash ~/git_projects/dot_files/scripts/distrobox_setup.sh"
